# Expected LOCAL paths for the private NVTA pack (git-ignored; never committed).
# Authorized users place data here; the code reads it locally. This mirrors the layout actually used.
private_root: "data_private/nvta"

inputs:
  corridor_sb_pm:      "data_private/nvta/corridor/SB_PM/"   # columns_/linkflow_timedependent.csv + network/ + crosswalk
  corridor_nb_am:      "data_private/nvta/corridor/NB_AM/"   # same, plus od_timedependent.csv
  qvdf_sb:             "data_private/nvta/qvdf/NVTA_SB/"      # handoff speed, daily_paq_PM/AM, Stage0_FD, qvdf params
  qvdf_nb:             "data_private/nvta/qvdf/NVTA_NB/"
  tmc_identification:  "data_private/nvta/tmc/TMC_Identification_{SB,NB}.csv"   # corridor->TMC reference
  vdot_screenlines:    "data_private/nvta/vdot/screenline_obs.csv"             # ACTUAL VDOT counts (+ link_screen.csv)
  superzone_network:   "data_private/nvta/superzone/network_am_link.csv"       # GMNS link.csv with tmc/VDOT fields
  superzone_cache:     "data_private/nvta/superzone/cache_nvta_{pathlink,arrays}.npz, cache_nvta_odkeys.pkl"  # regenerable operator cache

outputs:
  local_only: "data_private/nvta/outputs"   # generated CSVs with private link IDs stay here (git-ignored)
