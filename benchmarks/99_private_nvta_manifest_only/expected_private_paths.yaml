# Expected LOCAL paths for the private NVTA pack (git-ignored; never committed).
# Authorized users place data here; the code reads it locally.
private_root: "data_private/nvta"

inputs:
  network_gmns:        "data_private/nvta/network/link.csv"        # private GMNS link file (TMC, VDOT fields)
  nodes:               "data_private/nvta/network/node.csv"
  od_seed:             "data_private/nvta/od/od_seed.csv"          # TPB/COG-derived OD seed
  corridor_speed:      "data_private/nvta/inrix/handoff_timedependent.csv"   # INRIX/RITIS speed (private)
  corridor_linkflow:   "data_private/nvta/cbi/linkflow_timedependent.csv"    # CBI/FD-derived 15-min flow
  vdot_counts:         "data_private/nvta/vdot/screenline_counts.csv"        # ACTUAL VDOT counts (magnitude)
  tmc_identification:  "data_private/nvta/inrix/TMC_Identification.csv"       # corridor->TMC reference

outputs:
  local_only: "data_private/nvta/outputs"   # generated CSVs with private link IDs stay here (git-ignored)
